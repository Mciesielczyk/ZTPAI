<div class="container">
  <div class="header">
    <h2>Sklep / Lista Produktów</h2>
    <button class="btn-logout" (click)="logout()">Wyloguj się</button>
  </div>

  <div *ngIf="isAdmin" class="admin-panel">
    <h3>Dodaj nowy produkt (Panel Administratora)</h3>
    <form (ngSubmit)="onAddProduct()">
      <div class="form-group">
        <label>Nazwa:</label>
        <input type="text" [(ngModel)]="name" name="name" required />
      </div>
      <div class="form-group">
        <label>Cena:</label>
        <input type="number" [(ngModel)]="price" name="price" required />
      </div>
      <div class="form-group">
        <label>Opis:</label>
        <input type="text" [(ngModel)]="description" name="description" />
      </div>
      <button type="submit" class="btn-add">Dodaj produkt</button>
    </form>
    <div *ngIf="message" [ngClass]="{'error': isError, 'success': !isError}" class="alert">
      {{ message }}
    </div>
  </div>

  <div class="product-list">
    <h3>Dostępne produkty:</h3>
    <div *ngIf="products.length === 0">Brak produktów w bazie.</div>
    <div class="product-card" *ngFor="let p of products">
      <h4>{{ p.name }}</h4>
      <span class="price">{{ p.price }} PLN</span>
    </div>
  </div>
</div>
