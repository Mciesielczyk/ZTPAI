<div class="auth-box">
  <h2>{{ isLoginMode ? 'Logowanie' : 'Rejestracja' }}</h2>

  <form (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label>Nazwa użytkownika:</label>
      <input type="text" [(ngModel)]="username" name="username" required />
    </div>

    <div class="form-group" *ngIf="!isLoginMode">
      <label>Email:</label>
      <input type="email" [(ngModel)]="email" name="email" required />
    </div>

    <div class="form-group">
      <label>Hasło:</label>
      <input type="password" [(ngModel)]="password" name="password" required />
    </div>

    <div class="form-group" *ngIf="!isLoginMode">
      <label>Rola:</label>
      <select [(ngModel)]="role" name="role">
        <option value="USER">USER</option>
        <option value="ADMIN">ADMIN</option>
      </select>
    </div>

    <button type="submit">{{ isLoginMode ? 'Zaloguj się' : 'Zarejestruj się' }}</button>
  </form>

  <p class="toggle-text" (click)="toggleMode()">
    {{ isLoginMode ? 'Nie masz konta? Zarejestruj się' : 'Masz konto? Zaloguj się' }}
  </p>

  <div *ngIf="message" [ngClass]="{'error': isError, 'success': !isError}" class="alert">
    {{ message }}
  </div>
</div>
